<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raças de Gatos</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background-color: #fff7f0;
      color: #333;
    }

    header{
      background-color: #ffb347;
      color: white;
      text-align: center;
      padding: 25px;
    }

    nav{
      background-color: #ffd089;
      padding: 15px;
      text-align: center;
    }

    nav a{
      text-decoration: none;
      color: #333;
      margin: 0 15px;
      font-weight: bold;
    }

    .container{
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 40px;
    }

    .card{
      background-color: white;
      width: 280px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover{
      transform: scale(1.03);
    }

    .card img{
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content{
      padding: 20px;
      text-align: center;
    }

    footer{
      background-color: #ffb347;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <header>
    <h1>🐾 Raças de Gatos</h1>
    <p>Conheça algumas raças incríveis</p>
  </header>

  <nav>
    <a href="index.html">Início</a>
    <a href="racas.html">Raças</a>
  </nav>

  <section class="container">

    <div class="card">

      <img 
        src="https://images.unsplash.com/photo-1511044568932-338cba0ad803?q=80&w=1000&auto=format&fit=crop" 
        alt="Persa"
      >

      <div class="card-content">
        <h2>Persa</h2>
        <p>Calmo, elegante e muito fofinho.</p>
      </div>

    </div>

    <div class="card">

      <img 
        src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=1000&auto=format&fit=crop" 
        alt="Siamês"
      >

      <div class="card-content">
        <h2>Siamês</h2>
        <p>Inteligente, energético e carinhoso.</p>
      </div>

    </div>

    <div class="card">

      <img 
        src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?q=80&w=1000&auto=format&fit=crop" 
        alt="Maine Coon"
      >

      <div class="card-content">
        <h2>Maine Coon</h2>
        <p>Grande, bonito e muito amigável.</p>
      </div>

    </div>

  </section>

  <footer>
    <p>© 2026 Mundo dos Gatos</p>
  </footer>

</body>
</html>
